version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: bitstatus_app_1
      APP_PORT: 3710

  app:
    # Pineada por digest. Este es el digest de la imagen construida y verificada
    # localmente (linux/amd64). Tras hacer `docker push` confírmalo —y, si publicas
    # multi-arch con buildx, re-pinea— con el comando del README ("Construir y publicar").
    image: ghcr.io/voidhashh/bitstatus:1.0.0@sha256:35630ac638c934342a02418fbcef9fa7f603ac3ae8387b4b70eed1dc0bcf3e95
    restart: on-failure
    stop_grace_period: 1m
    environment:
      PORT: 3710
      ELECTRUM_HOST: $APP_ELECTRS_NODE_IP
      ELECTRUM_PORT: $APP_ELECTRS_NODE_PORT
      # Precio fiat OPCIONAL. Apúntalo a tu mempool local de Umbrel.
      # Vacío o ausente = modo solo-BTC, sin ninguna petición saliente.
      # PRICE_API_URL: http://10.21.0.0:3006/api/v1/prices
    volumes:
      - ${APP_DATA_DIR}/data:/data
