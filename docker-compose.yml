version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: bitstatus_app_1
      APP_PORT: 3710

  app:
    # Pineada por digest. Este es el digest de la imagen construida y verificada
    # localmente (linux/amd64). Tras hacer `docker push` confírmalo —y, si publicas
    # multi-arch con buildx, re-pinea— con el comando del README ("Construir y publicar").
    image: ghcr.io/voidhashh/bitstatus:1.0.2@sha256:835ed47a39e3390a67ed5b9ddc582b31381ddbbe64f31ece6f4319aa74908800
    restart: on-failure
    stop_grace_period: 1m
    environment:
      PORT: 3710
      ELECTRUM_HOST: $APP_ELECTRS_NODE_IP
      ELECTRUM_PORT: $APP_ELECTRS_NODE_PORT
      # Precio fiat desde la mempool LOCAL de tu Umbrel por su RUTA INTERNA: no expone
      # tu IP de LAN ni depende de DHCP. Usa las variables que Umbrel inyecta para la
      # app mempool (requiere 'mempool' en dependencies, ver umbrel-app.yml).
      # Vacía/ausente = modo solo-BTC, sin ninguna petición saliente.
      PRICE_API_URL: http://$APP_MEMPOOL_IP:$APP_MEMPOOL_PORT/api/v1/prices
      # Fallback por IP de tu LAN si la variable interna no resolviera en tu umbrelOS
      # (sustituye TU_IP_UMBREL por la IP local de tu nodo):
      # PRICE_API_URL: http://TU_IP_UMBREL:3006/api/v1/prices
    volumes:
      - ${APP_DATA_DIR}/data:/data
